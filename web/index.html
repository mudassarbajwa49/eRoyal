<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- ── App Identity ─────────────────────────────── -->
    <title>eRoyal</title>
    <meta name="description" content="Royal City Housing Society Management App" />
    <meta name="application-name" content="eRoyal" />

    <!-- ── Browser Tab Icon (favicon) ──────────────── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon.png" />
    <link rel="shortcut icon" href="/assets/images/favicon.png" />

    <!-- ── PWA: Add to Home Screen (Android / Chrome) ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D9488" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── PWA: Add to Home Screen (iOS Safari) ──────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="eRoyal" />
    <link rel="apple-touch-icon" href="/assets/images/favicon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/images/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon.png" />

    <!-- ── Open Graph (WhatsApp / social link previews) ── -->
    <meta property="og:title" content="eRoyal" />
    <meta property="og:description" content="Royal City Housing Society Management" />
    <meta property="og:image" content="/assets/images/favicon.png" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <!-- Expo Router injects the app here -->
  </body>
</html>
