      <line x1="130" y1="178" x2="130" y2="615" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/><line x1="380" y1="178" x2="380" y2="615" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/><line x1="630" y1="178" x2="630" y2="615" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/><line x1="875" y1="178" x2="875" y2="615" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/><line x1="1070" y1="178" x2="1070" y2="615" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>
      
