<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
    <defs>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
        <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
      </marker>
      <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.15"/>
      </filter>
    </defs>
    <rect width="1200" height="720" fill="#ffffff"/>
    <rect x="28" y="24" width="1144" height="672" rx="24" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="600" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#0f172a"><tspan x="600" dy="0">Login Sequence</tspan></text>
    
      <text x="150" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" fill="#0f172a"><tspan x="150" dy="0">User</tspan></text>
      <text x="380" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" fill="#0f172a"><tspan x="380" dy="0">Login Screen</tspan></text>
      <text x="620" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" fill="#0f172a"><tspan x="620" dy="0">AuthContext</tspan></text>
      <text x="850" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" fill="#0f172a"><tspan x="850" dy="0">Firebase</tspan></text>
      <text x="1050" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" fill="#0f172a"><tspan x="1050" dy="0">Router</tspan></text>
      <line x1="150" y1="180" x2="150" y2="610" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/><line x1="380" y1="180" x2="380" y2="610" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/><line x1="620" y1="180" x2="620" y2="610" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/><line x1="850" y1="180" x2="850" y2="610" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/><line x1="1050" y1="180" x2="1050" y2="610" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>
      
    <line x1="150" y1="235" x2="380" y2="235" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
